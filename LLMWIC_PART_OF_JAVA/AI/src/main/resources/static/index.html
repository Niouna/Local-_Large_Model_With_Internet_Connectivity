<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地 AI 助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>本地 AI 助手</h1>
        <p id="statusText">⚙️ 连接已建立，准备就绪。</p>
    </header>

    <div class="chat-box" id="chatBox">
        <!-- 消息会动态添加到这里 -->
        <div class="message system">

            <div class="content">欢迎！点击 🌐 按钮可开启联网搜索模式。</div>
        </div>
    </div>

    <!-- 模式状态指示器 -->
    <div id="modeIndicator" class="mode-indicator">当前模式：本地对话</div>

    <div class="input-area">
        <!-- 联网搜索开关 -->
        <button id="webSearchToggle" class="web-toggle" title="开启联网搜索">
            🌐
        </button>

        <textarea id="userInput" placeholder="输入消息... (Shift+Enter 换行)" rows="1"></textarea>
        <button id="sendBtn">发送</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
