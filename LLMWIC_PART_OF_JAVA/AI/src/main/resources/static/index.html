<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLMWIC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 左侧侧边栏 -->
<div class="sidebar">
    <div class="logo">LLMWIC</div>
    <ul class="menu">
        <li class="menu-item active" data-page="rag">
            <span>LLMWIC_RAG</span>
        </li>
        <li class="menu-item" data-page="role-playing">
            <span>LLMWIC_Role_playing</span>
        </li>
<!--         后台管理项，使用 onclick 进行跳转 老方法，暂时弃置-->
<!--        <li class="menu-item" onclick="window.location.href='http://localhost:8080/admin/admin.html'">-->
<!--            <span>后台管理</span>-->
<!--        </li>-->

        <!-- 新增后台管理项，使用 data-action 区分 -->
        <li class="menu-item" data-action="redirect" data-url="http://localhost:8080/admin/admin.html">
            <span>后台管理</span>
        </li>
    </ul>
</div>

<!-- 主内容区 -->
<div class="main-content">
    <!-- 头部区域：模型选择 -->
    <div class="header">
        <div class="model-select">
            <label for="gpuModelSelect">GPU 模型：</label>
            <select id="gpuModelSelect">
                <option value="">加载中...</option>
            </select>
        </div>
        <div class="model-select">
            <label for="cpuModelSelect">CPU 模型：</label>
            <select id="cpuModelSelect">
                <option value="">加载中...</option>
            </select>
        </div>
        <div class="prompt">选择一个模型开始对话</div>
    </div>

    <!-- 内容区域（根据页面切换） -->
    <div id="rag-page" class="page active">
        <div class="chat-container">
            <div id="chatMessages"></div>
            <div class="input-area">
                <button id="webSearchToggle" class="web-toggle">🌐</button>
                <textarea id="messageInput" placeholder="输入消息..."></textarea>
                <button id="sendBtn">发送</button>
            </div>
        </div>
    </div>

    <div id="role-playing-page" class="page">
        <div class="placeholder">
            <h2>LLMWIC_Role_playing</h2>
            <p>此页面正在开发中...</p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
